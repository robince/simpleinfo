name: MATLAB Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  matlab-linux-ubuntu:
    name: MATLAB Linux x86_64 ${{ matrix.release }} (${{ matrix.ubuntu }})
    runs-on: ${{ matrix.ubuntu }}
    strategy:
      matrix:
        ubuntu: [ubuntu-22.04]
        release: [R2024b]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set release ID
        shell: bash
        run: |
          release="${{ matrix.release }}"
          echo "RELEASE_ID=${release#R}" >> "$GITHUB_ENV"

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          release: ${{ matrix.release }}

      - name: Build, smoke-test, and package native MEX runtime
        uses: matlab-actions/run-build@v3
        with:
          tasks: test package

      - name: Rename artifact with Ubuntu version
        shell: bash
        run: |
          set -euo pipefail
          for f in build/matlab/packages/fastinfo_cpp_mex_${RELEASE_ID}_*.zip; do
            mv "$f" "${f%.zip}_${{ matrix.ubuntu }}.zip"
          done

      - name: Upload packaged runtime artifact
        uses: actions/upload-artifact@v6
        with:
          name: fastinfo-cpp-mex-${{ matrix.release }}-linux-x86_64-${{ matrix.ubuntu }}
          path: build/matlab/packages/fastinfo_cpp_mex_${{ env.RELEASE_ID }}_*_${{ matrix.ubuntu }}.zip
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          files=(build/matlab/packages/fastinfo_cpp_mex_${RELEASE_ID}_*_${{ matrix.ubuntu }}.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release assets found for tag ${TAG}" >&2
            exit 1
          fi

          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            gh release create "${TAG}" --title "${TAG}" --notes "" || gh release view "${TAG}" >/dev/null
          fi

          gh release upload "${TAG}" "${files[@]}" --clobber

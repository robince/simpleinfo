name: MATLAB Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  matlab-macos:
    name: MATLAB macOS ${{ matrix.release }}
    runs-on: macos-15
    strategy:
      matrix:
        release: [R2024b]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set release ID
        shell: bash
        run: |
          release="${{ matrix.release }}"
          echo "RELEASE_ID=${release#R}" >> "$GITHUB_ENV"

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          release: ${{ matrix.release }}

      - name: Build, smoke-test, and package native MEX runtime
        uses: matlab-actions/run-build@v3
        with:
          tasks: test package

      - name: Upload packaged runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastinfo-cpp-mex-${{ matrix.release }}-macos
          path: build/matlab/packages/fastinfo_cpp_mex_${{ env.RELEASE_ID }}_*.zip
          if-no-files-found: error

  matlab-linux-ubuntu:
    name: MATLAB Linux x86_64 ${{ matrix.release }} (${{ matrix.ubuntu }})
    runs-on: ${{ matrix.ubuntu }}
    strategy:
      matrix:
        ubuntu: [ubuntu-22.04]
        release: [R2024b]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set release ID
        shell: bash
        run: |
          release="${{ matrix.release }}"
          echo "RELEASE_ID=${release#R}" >> "$GITHUB_ENV"

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          release: ${{ matrix.release }}

      - name: Build, smoke-test, and package native MEX runtime
        uses: matlab-actions/run-build@v3
        with:
          tasks: test package

      - name: Rename artifact with Ubuntu version
        shell: bash
        run: |
          set -euo pipefail
          for f in build/matlab/packages/fastinfo_cpp_mex_${RELEASE_ID}_*.zip; do
            mv "$f" "${f%.zip}_${{ matrix.ubuntu }}.zip"
          done

      - name: Upload packaged runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastinfo-cpp-mex-${{ matrix.release }}-linux-x86_64-${{ matrix.ubuntu }}
          path: build/matlab/packages/fastinfo_cpp_mex_${{ env.RELEASE_ID }}_*_${{ matrix.ubuntu }}.zip
          if-no-files-found: error
